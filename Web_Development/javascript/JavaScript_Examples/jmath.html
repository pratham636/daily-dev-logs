<html>
	<head>
		<title>JavaScript Tutorials</title>
		<script>
			
			function calc()
			{
				let r= 5;
				let area = Math.PI * r* r;
				document.write("JavaScript Math library functions<br/>");
				document.write("Area of circle with radius "+r + " is ="+ area +"<br/>");
				document.write("Maths Absolute "+Math.abs(-10.5)+"<br/>");
				document.write("Maths Random "+ Math.random()+"<br/>");
				document.write("Maths Square Root " +Math.sqrt(16)+"<br/>"); 
				document.write("Math Ceil "+Math.ceil(9.99)+"<br/>");
				document.write("Math floor "+Math.floor(9.99)+"<br/>");
				document.write("Maths Round "+Math.round(7.25)+"<br/>");  // Prints: 7
				document.write("Maths Round "+Math.round(4.49)+"<br/>");
				document.write("Maths Max "+Math.max(1, 3, 2)+"<br/>");  // Prints: 3
				document.write("Maths Min "+Math.min(1, 3, 2)+"<br/>");
				document.write("Maths power "+Math.pow(3, 2)); 
			}

		</script>
	</head>
	<body>
			<p>JavaScript Math library functions</p> <br/>
			<button onclick="calc()">Math Functions</button><br/><br/>
	</body>
</html>
